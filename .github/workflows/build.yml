name: Build npm package

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      repo:
        type: string
        required: true
        default: 'trxcllnt/node-webrtc'
        description: 'node-webrtc repo to use'
      branch-or-tag:
        type: string
        required: true
        default: 'node-webrtc-nvenc'
        description: 'Branch or tag to checkout'
      make-release:
        type: boolean
        required: false
        default: false
        description: 'Make GitHub release'
      draft-release:
        type: boolean
        required: false
        default: false
        description: 'Mark release as draft'

jobs:
  build:
    name: Build npm packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        arch: ["amd64", "arm64"]
        node: ["18.2.0"]
        cuda: ["12.9.1"]
        linux: ["ubuntu20.04"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout LFS
        run: git lfs checkout

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          buildkitd-flags: --debug

      - name: Build npm packages
        uses: docker/build-push-action@v7
        with:
          context: .
          pull: true
          push: false
          file: ci/build.Dockerfile
          outputs: type=local,dest=packages
          # todo: sbsa
          platforms: linux/${{matrix.arch}}
          build-args: |
            "SCCACHE_REGION=us-west-2"
            "SCCACHE_IDLE_TIMEOUT=32768"
            "SCCACHE_BUCKET=node-rapids-sccache"
            "NODE_VERSION=${{ matrix.node }}"
            "NODE_WEBRTC_REPO=${{ inputs.repo }}"
            "NODE_WEBRTC_BRANCH=${{ inputs.branch-or-tag }}"
            "AMD64_BASE=nvidia/cuda:${{ matrix.cuda }}-devel-${{ matrix.linux }}"
            "ARM64_BASE=nvidia/cuda:${{ matrix.cuda }}-devel-${{ matrix.linux }}"
          secrets: |
            "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}"
            "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Upload npm packages
        uses: actions/upload-artifact@v6
        with:
          name: wrtc-${{matrix.arch}}
          path: packages/*.tgz

  release:
    needs: [build]
    name: Create GitHub release
    if: ${{ inputs.make-release == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Download npm packages
        continue-on-error: true # This may fail if no jobs succeed. The checks below will catch this.
        uses: actions/download-artifact@v6
        with:
          path: packages
          pattern: wrtc-*
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: ""
          tag_name: "v0.4.7"
          draft: ${{ inputs.draft-release }}
          repository: ${{ github.repository }}
          files: packages/*.tgz

      - name: Clean up
        run: |
          rm packages/*.tgz
